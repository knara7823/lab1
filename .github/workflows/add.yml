name: build

on:
  issues:
    types: [opened, closed]

  workflow_dispatch:
    inputs:
      cpp_file:
        description: "C++ file to compile"
        required: true
        default: "hello.cpp"
      var2:
        description: "variable 2"
        type: boolean
        required: false
        default: true
      var3:
        description: "variable 3"
        type: number
        required: false
        default: 2026

  push:
    branches: ["main", "dev_branch"]
    tags:
      - 'v*'

  pull_request:
    branches: ["main", "dev_branch"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grant write permissions for creating the release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Token is provided by Actions
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Changes in this Release:
            - First Change
            - Second Change
          draft: false
          prerelease: false
  build:
    strategy:
      matrix:
        os:
          - ubuntu-20.04
          - ubuntu-22.04
          - ubuntu-24.04

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install g++
        run: sudo apt update && sudo apt install -y g++

      - name: Compile C++ file
        run: g++ -std=c++17 -O2 -Wall -Wextra ${{ inputs.cpp_file || 'hello.cpp' }} -o main

      - name: Run executable
        run: ./main
